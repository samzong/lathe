version: 2

project_name: lathe

builds:
  - id: lathe
    main: ./cmd/lathe
    binary: lathe
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/samzong/lathe/pkg/lathe.Version={{ .Version }}
      - -X github.com/samzong/lathe/pkg/lathe.Commit={{ .ShortCommit }}
      - -X github.com/samzong/lathe/pkg/lathe.Date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - ids:
      - lathe
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

source:
  enabled: true
  name_template: "{{ .ProjectName }}_{{ .Version }}_source"
  format: tar.gz

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: samzong
    name: lathe
  prerelease: auto
  name_template: "{{ .Tag }}"
