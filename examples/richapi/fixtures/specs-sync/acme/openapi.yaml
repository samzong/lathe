openapi: "3.0.3"
info:
  title: Acme API
  version: "1.0.0"
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      operationId: System_Healthz
      tags: [System]
      summary: Health check
      security: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /users:
    get:
      operationId: Users_List
      tags: [Users]
      summary: List users with pagination
      parameters:
        - name: page_token
          in: query
          schema:
            type: string
          description: Cursor for next page
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Max results per page
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, suspended]
          description: Filter by status
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  next_page_token:
                    type: string
    post:
      operationId: Users_Create
      tags: [Users]
      summary: Create a new user
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /users/{user_id}:
    parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: Users_Get
      tags: [Users]
      summary: Get user by ID
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: Users_Update
      tags: [Users]
      summary: Update a user
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: Users_Delete
      tags: [Users]
      summary: Delete a user
      deprecated: true
      security:
        - bearerAuth: [admin:write, admin:delete]
      responses:
        "204": {}
  /users/{user_id}/avatar:
    post:
      operationId: Users_UploadAvatar
      tags: [Users]
      summary: Upload user avatar
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: X-Request-Id
          in: header
          schema:
            type: string
          description: Trace ID for request tracking
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
  /reports/{report_id}/download:
    get:
      operationId: Reports_Download
      tags: [Reports]
      summary: Download report as PDF
      parameters:
        - name: report_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/pdf:
              schema:
                type: string
                format: binary
  /events:
    get:
      operationId: Events_Stream
      tags: [Events]
      summary: Stream events via SSE
      responses:
        "200":
          content:
            text/event-stream:
              schema:
                type: string
  /jobs:
    post:
      operationId: Jobs_Create
      tags: [Jobs]
      summary: Create a long-running job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                params:
                  type: object
      responses:
        "202":
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  status:
                    type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    UserInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
